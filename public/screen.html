<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS キャプチャ画面 | ロボコン用タイマー</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600&family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
</head>
<body class="capture-mode">
    <div class="screen-container">
        <!-- 上半分: 時間表示 -->
        <div class="timer-section" id="timer-bg">
            <div class="phase-label" id="phase-label">SETTING TIME</div>
            <div class="time-display" id="time-display">01:00</div>
        </div>
        
        <!-- 下半分: 赤青得点 (左右分割) -->
        <div class="score-section">
            <div class="team-panel team-red" id="bg-red">
                <div class="team-name" id="name-red">RED TEAM</div>
                <div class="team-score" id="score-red">0</div>
                <div class="vgoal-label" id="vgoal-red">V-GOAL!</div>
            </div>
            <div class="team-panel team-blue" id="bg-blue">
                <div class="team-name" id="name-blue">BLUE TEAM</div>
                <div class="team-score" id="score-blue">0</div>
                <div class="vgoal-label" id="vgoal-blue">V-GOAL!</div>
            </div>
        </div>
    </div>
    <script src="js/audio.js"></script>
    <script src="js/screen.js"></script>
</body>
</html>
